<!DOCTYPE html>
<html>
<head>
<title>Digital Library Access | EduSecureX</title>

<style>

body{
    background: linear-gradient(rgba(10,24,50,0.9), rgba(30,60,114,0.85)),
    url('https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&w=1920&q=80');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    font-family: "Segoe UI", Arial;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

/* Glass container */

.box{
    width:420px;
    padding:45px;
    border-radius:20px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 20px 40px rgba(0,0,0,0.6);
    text-align:center;
}

.icon{
    font-size:60px;
    margin-bottom:15px;
}

h2{
    margin-bottom:10px;
    letter-spacing:1px;
}

p{
    font-size:15px;
    color:rgba(255,255,255,0.8);
    margin-bottom:25px;
}

/* Input fields */

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:6px;
    border:none;
}

/* Button */

button{
    margin-top:20px;
    padding:14px;
    width:100%;
    border:none;
    border-radius:30px;
    font-weight:bold;
    background:linear-gradient(45deg,#ff416c,#ff4b2b);
    color:white;
    cursor:pointer;
    letter-spacing:1px;
}

button:hover{
    filter:brightness(1.1);
}

.notice{
    margin-top:18px;
    font-size:12px;
    color:rgba(255,255,255,0.5);
}

</style>
</head>

<body>

<div class="box">

<div class="icon">📚</div>

<h2>Digital Library Access</h2>

<p>
For secure access to the EduSecureX Digital Library,
please verify your student credentials.
</p>

<form action="/library-login" method="POST">

<input type="text" name="username" placeholder="Student Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Access Library</button>

</form>

<div class="notice">
EduSecureX Secure Academic Resource Portal
</div>

</div>

</body>
</html>
