<!DOCTYPE html>
<html>
<head>
    <title>Upload Successful | EduSecureX</title>
    <style>
       body {
            /* Consistent high-tech blue background */
            background: linear-gradient(rgba(10, 24, 50, 0.85), rgba(30, 60, 114, 0.9)), 
                        url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            text-align: center;
        }

        /* Glassmorphism box to match the main UI */
        .box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 40px;
            width: 420px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        /* Animated Success Icon */
        .icon {
            font-size: 60px;
            margin-bottom: 20px;
            display: inline-block;
            filter: drop-shadow(0 0 15px rgba(39, 174, 96, 0.6));
            animation: bounceIn 0.8s ease-out;
        }

        h2 {
            color: #2ecc71; /* Success Green */
            font-size: 24px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
        }

        /* Red-Orange Gradient Button from homepage */
        a {
            display: inline-block;
            margin-top: 30px;
            padding: 14px 30px;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(255, 65, 108, 0.3);
        }

        a:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 75, 43, 0.5);
            filter: brightness(1.1);
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        .footer-tag {
            margin-top: 25px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
        }
            </style>
</head>
<body>

<div class="box">
    <div class="icon">📤</div>
    <h2>Assignment Uploaded Successfully</h2>
    <p>Your file has been submitted for evaluation.</p>

    <a href="/">🏠 Back to Dashboard</a>
</div>

</body>
</html>
