<!DOCTYPE html>
<html>
<head>
    <title>Secure Session | EduSecureX</title>
    <style>
       body {
            /* Using the high-tech blue grid background to match your site theme */
            background: linear-gradient(rgba(10, 24, 50, 0.9), rgba(30, 60, 114, 0.85)), 
                        url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
        }

        /* Glassmorphism box */
        .box {
            width: 400px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 45px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .shield-icon {
            font-size: 50px;
            margin-bottom: 20px;
            display: inline-block;
            filter: drop-shadow(0 0 10px rgba(255, 75, 43, 0.4));
        }

        h2 {
            font-size: 24px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
            color: #ffffff;
        }

        p {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* Signature Red-Orange Gradient Button */
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(255, 65, 108, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(255, 75, 43, 0.5);
            filter: brightness(1.1);
        }

        .alert-footer {
            margin-top: 25px;
            font-size: 10px;
            color: #ff4b2b; /* Alert red */
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Session Expired</h2>
    <p>
        For security reasons, your session has expired.<br>
        Please verify to continue.
    </p>

    <button onclick="window.location.href='/verify-account'">
        Verify Session
    </button>
</div>

</body>
</html>
