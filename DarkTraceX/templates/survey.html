<!DOCTYPE html>
<html>
<head>
    <title>Student Survey | EduSecureX</title>
    <style>
       body {
            /* Using the high-tech blue grid background to match your site theme */
            background: linear-gradient(rgba(10, 24, 50, 0.9), rgba(30, 60, 114, 0.85)), 
                        url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
        }

        /* Glassmorphism box container */
        .box {
            width: 450px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        h2 {
            font-size: 24px;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(to right, #ffffff, #cbd5e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        label {
            font-weight: 600;
            display: block;
            margin-top: 20px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 0.5px;
        }

        /* Styling the dropdown selects */
        select {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            transition: all 0.3s ease;
        }

        select:focus {
            border-color: #ff4b2b;
            box-shadow: 0 0 10px rgba(255, 75, 43, 0.3);
        }

        /* Signature Red-Orange Gradient Button */
        button {
            width: 100%;
            padding: 16px;
            margin-top: 30px;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(255, 65, 108, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(255, 75, 43, 0.5);
            filter: brightness(1.1);
        }

        .footer-note {
            text-align: center;
            margin-top: 25px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Student Feedback Survey</h2>

    <form method="POST" action="/survey-submit">
        <label>How satisfied are you with the portal?</label>
        <select required>
            <option>Very Satisfied</option>
            <option>Satisfied</option>
            <option>Neutral</option>
            <option>Unsatisfied</option>
        </select>

        <label>Would you recommend this platform?</label>
        <select required>
            <option>Yes</option>
            <option>No</option>
        </select>

        <button type="submit">Submit Survey</button>
    </form>
</div>

</body>
</html>
