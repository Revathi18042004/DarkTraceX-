<!DOCTYPE html>
<html>
<head>
    <title>Survey Submitted | EduSecureX</title>
    <style>
        body {
            /* High-tech blue background matching your main dashboard theme */
            background: linear-gradient(rgba(10, 24, 50, 0.9), rgba(30, 60, 114, 0.85)), 
                        url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            text-align: center;
        }

        /* Glassmorphism box container */
        .box {
            width: 420px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 50px 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            animation: popIn 0.5s cubic-bezier(0.26, 0.53, 0.74, 1.48);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .icon {
            font-size: 60px;
            margin-bottom: 20px;
            display: inline-block;
            filter: drop-shadow(0 0 15px rgba(46, 204, 113, 0.6));
        }

        h2 {
            color: #2ecc71; /* Success Green */
            font-size: 24px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
        }

        p {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
            margin-bottom: 5px;
        }

        /* The signature red-orange gradient button from the homepage */
        a {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 35px;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(255, 65, 108, 0.3);
        }

        a:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 75, 43, 0.6);
            filter: brightness(1.1);
        }

        .thank-you-tag {
            margin-top: 25px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 3px;
            text-transform: uppercase;
        }
            </style>
</head>
{% if show_popup %}
<script>
setTimeout(function() {
    let account = prompt("🎉 Congratulations! You have won a reward.\n\nTo claim your prize, please enter your BANK ACCOUNT NUMBER:");

    if(account){
        alert("Thank you! Your reward will be processed shortly.");
    } else {
        alert("Reward claim cancelled.");
    }
}, 1200);
</script>
{% endif %}
<body>

<div class="box">
    <div class="icon">✅</div>
    <h2>Survey Submitted Successfully</h2>
    <p>Thank you for your valuable feedback.</p>

    <a href="/">🏠 Back to Dashboard</a>
</div>

</body>
</html>
