<!DOCTYPE html>
<html>
<head>
    <title>Assignment Upload</title>
    <style>
       body {
            /* Using a high-tech digital circuit/grid background for the "Cyber" theme */
            background: linear-gradient(rgba(10, 24, 50, 0.85), rgba(30, 60, 114, 0.9)), 
                        url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            overflow: hidden;
        }

        /* The glass box matching your homepage card */
        .box {
            width: 450px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 45px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 800;
            background: linear-gradient(to right, #fff, #cbd5e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Interactive Upload Zone */
        .file-upload-wrapper {
            position: relative;
            margin-bottom: 25px;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 40px 20px;
            transition: all 0.4s ease;
            background: rgba(0, 0, 0, 0.2);
        }

        .file-upload-wrapper:hover {
            border-color: #ff4b2b;
            background: rgba(255, 255, 255, 0.05);
            transform: scale(1.02);
        }

        .file-upload-wrapper input[type="file"] {
            cursor: pointer;
            opacity: 0;
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
        }

        .upload-icon {
            font-size: 50px;
            margin-bottom: 15px;
            display: block;
            filter: drop-shadow(0 0 10px rgba(255, 75, 43, 0.3));
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* Signature Red-Orange Gradient Button */
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(255, 65, 108, 0.3);
        }

        button:hover {
            box-shadow: 0 15px 30px rgba(255, 75, 43, 0.5);
            transform: translateY(-2px);
        }

        .status-bar {
            margin-top: 25px;
            font-size: 11px;
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Upload Assignment</h2>
    <form method="POST" action="/upload-assignment" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <button type="submit">Submit Assignment</button>
    </form>
</div>

</body>
</html>
