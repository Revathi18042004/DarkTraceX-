<!DOCTYPE html>
<html>
<head>
    <title>Login Successful | EduSecureX</title>
    <style>
       body {
            /* Consistent background with your home page theme */
            background: linear-gradient(rgba(30, 60, 114, 0.85), rgba(42, 82, 152, 0.85)), 
                        url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
        }

        /* Glassmorphism card matching the home page UI */
        .box {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 50px 40px;
            width: 400px;
            text-align: center;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        /* Success Icon */
        .success-icon {
            width: 70px;
            height: 70px;
            background: #27ae60;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            margin: 0 auto 20px;
            box-shadow: 0 0 20px rgba(39, 174, 96, 0.5);
        }

        h2 {
            font-size: 28px;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        p {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
        }

        /* Button styled like the "Get Started Now" button in your screenshot */
        a {
            display: inline-block;
            padding: 14px 30px;
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 75, 43, 0.3);
        }

        a:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 75, 43, 0.5);
            filter: brightness(1.1);
        }

        .footer-brand {
            position: absolute;
            bottom: 30px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Login Successful</h2>
    <p>Welcome to EduSecureX Learning Portal</p>
    <a href="/">Go to Dashboard</a>
</div>

</body>
</html>
