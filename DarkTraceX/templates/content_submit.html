<!DOCTYPE html>
<html>
<head>
    <title>Course Content Submission</title>
    <style>
        body {
            /* High-tech blue cyber background matching your dashboard */
            background: linear-gradient(rgba(10, 24, 50, 0.85), rgba(30, 60, 114, 0.9)), 
                        url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
        }

        /* Glassmorphism box container */
        .box {
            width: 480px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 45px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
            background: linear-gradient(to right, #ffffff, #cbd5e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Styled text input */
        input[type="text"] {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 10px;
            font-size: 15px;
            color: #333;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: 3px solid #ff4b2b;
            background: #ffffff;
        }

        /* The signature orange-red gradient button */
        button {
            width: 100%;
            padding: 16px;
            margin-top: 25px;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(255, 65, 108, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(255, 75, 43, 0.5);
            filter: brightness(1.1);
        }

        .input-label {
            text-align: left;
            display: block;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .badge {
            display: inline-block;
            margin-top: 20px;
            padding: 5px 12px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 4px;
            font-size: 10px;
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
            </style>
</head>
<body>

<div class="box">
    <h2>Submit Course Content</h2>
    <form method="POST" action="/content-check">
        <input type="text" name="content" placeholder="Enter course description" required>
        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>
