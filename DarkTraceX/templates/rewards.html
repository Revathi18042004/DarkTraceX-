<!DOCTYPE html>
<html>
<head>
    <title>Student Rewards Program</title>
    <style>
       body {
            /* Using the high-tech digital background matching your dashboard theme */
            background: linear-gradient(rgba(10, 24, 50, 0.9), rgba(30, 60, 114, 0.85)), 
                        url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            text-align: center;
        }

        /* Glassmorphism box container */
        .box {
            width: 440px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 50px 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            transition: transform 0.3s ease;
        }

        .box:hover {
            transform: translateY(-5px);
        }

        .reward-icon {
            font-size: 60px;
            margin-bottom: 20px;
            display: inline-block;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.4));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        h2 {
            font-size: 26px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
            background: linear-gradient(to right, #ffffff, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
            margin-bottom: 10px;
        }

        /* The signature red-orange gradient button from your homepage */
        button {
            width: 100%;
            padding: 16px;
            margin-top: 25px;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(255, 65, 108, 0.3);
        }

        button:hover {
            transform: scale(1.03);
            box-shadow: 0 15px 30px rgba(255, 75, 43, 0.6);
            filter: brightness(1.1);
        }

        .benefit-tag {
            margin-top: 30px;
            font-size: 10px;
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>🎉 Student Rewards Survey</h2>
    <p>
        Participate in a short academic survey and receive
        exclusive learning benefits.
    </p>
    <button onclick="window.location.href='/survey'">Start Survey</button>
</div>

</body>
</html>
