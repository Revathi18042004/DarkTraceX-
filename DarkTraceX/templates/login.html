<!DOCTYPE html>
<html>
<head>
    <title>Student Login | EduSecureX</title>
    <style>
        body {
            /* Using a high-quality dark-blue tech background to match your screenshot */
            background: linear-gradient(rgba(30, 60, 114, 0.8), rgba(42, 82, 152, 0.8)), 
                        url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Glassmorphism effect to match the center card in your image */
        .box {
            width: 380px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            color: white;
        }

        h2 {
            text-align: center;
            color: #ffffff;
            font-size: 28px;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            box-sizing: border-box; /* Ensures padding doesn't affect width */
            font-size: 14px;
        }

        input:focus {
            outline: 2px solid #ff4b2b; /* Matching the orange-red button accent */
        }

        /* Button styled to match the "Get Started Now" button in your image */
        button {
            width: 100%;
            padding: 14px;
            margin-top: 25px;
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            color: white;
            border: none;
            border-radius: 30px; /* Rounded pill shape */
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 75, 43, 0.4);
        }

        .error {
            background: rgba(255, 0, 0, 0.2);
            border-left: 4px solid #ff4b2b;
            color: #fff;
            padding: 10px;
            text-align: center;
            margin-bottom: 15px;
            border-radius: 4px;
            font-size: 13px;
        }
        

        .footer-text {
            position: absolute;
            bottom: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
        }
    </style>
    </head>
<body>

<div class="box">
    <h2>Student Login</h2>

    {% if message %}
        <p class="error">{{ message }}</p>
    {% endif %}

    <form method="POST" action="/login-check">
        <input type="text" name="username" placeholder="Student ID" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
      
    </form>
</div>

</body>
</html>
