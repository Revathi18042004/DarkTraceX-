<!DOCTYPE html>
<html>
<head>
    <title>External Learning Resource | EduSecureX</title>
    <style>
        body {
            /* High-tech blue cyber background matching your dashboard screenshot */
            background: linear-gradient(rgba(10, 24, 50, 0.9), rgba(30, 60, 114, 0.85)), 
                        url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            text-align: center;
        }

        /* Glassmorphism box container */
        .box {
            width: 450px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 50px 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
        }

        h2 {
            font-size: 26px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
        }

        p {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* The signature red-orange gradient button from the homepage */
        a {
            display: inline-block;
            padding: 16px 35px;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(255, 65, 108, 0.3);
        }

        a:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 75, 43, 0.6);
            filter: brightness(1.1);
        }

        .resource-icon {
            font-size: 50px;
            margin-bottom: 20px;
            display: block;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
        }

        .security-note {
            margin-top: 30px;
            font-size: 11px;
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="box">
    <span class="resource-icon">📚</span>
    <h2>Download Study Material</h2>
    <p>Access additional learning resources below. All files are encrypted for your security.</p>

    <a href="/resource-download">Download Resource</a>

    
</div>

</body>
</html>
